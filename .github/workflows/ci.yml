name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  server-tests:
    name: 后端单元测试 (jest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: 安装依赖 (确定性)
        run: npm ci --no-audit --no-fund

      - name: 运行单元测试
        run: npm test
        env:
          CI: 'true'
